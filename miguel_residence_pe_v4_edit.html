const state={tab:"ter",zone:"gar",type:"exec",cat:"TODOS",q:"",leg:false,
  st:Object.fromEntries(D.map(d=>[d.id,"pendente"])),
  det:{},exp:{},customItems:[],col:{},
  addForm:false,
  af:{zone:"gar",type:"exec",cat:"",catNew:"",tg:"ARQ",txt:"",obs:""}
};

const SKEY='mr_pe_v4';
async function saveAll(){try{await window.storage.set(SKEY,JSON.stringify({st:state.st,det:state.det,customItems:state.customItems}));}catch(e){}}
async function loadAll(){
  try{
    const r=await window.storage.get(SKEY);
    if(r&&r.value){
      const s=JSON.parse(r.value);
      if(s.st)Object.assign(state.st,s.st);
      if(s.det)state.det=s.det;
      if(s.customItems){
        state.customItems=s.customItems;
        state.customItems.forEach(i=>{if(!state.st[i.id])state.st[i.id]="pendente";});
        state.customItems.forEach(i=>{
          const z=i.z,tp=i.tp;
          if(CAT[z]&&CAT[z][tp]&&!CAT[z][tp].includes(i.c))CAT[z][tp].push(i.c);
        });
      }
    }
  }catch(e){}
  render();
}

function allItems(){return[...D,...state.customItems];}
function zD(z){return allItems().filter(i=>i.z===z);}
function zPct(z){const a=zD(z);const d=a.filter(i=>state.st[i.id]==="concluido").length;return a.length?Math.round(d/a.length*100):0;}
function gPct(){const d=allItems().filter(i=>state.st[i.id]==="concluido").length;return Math.round(d/allItems().length*100);}
function tSt(){const z=state.tab==="dry"?"dry":state.zone;const a=allItems().filter(i=>i.z===z&&i.tp===state.type);const d=a.filter(i=>state.st[i.id]==="concluido").length,p=a.filter(i=>state.st[i.id]==="pendente").length,cr=a.filter(i=>state.st[i.id]==="critico").length,an=a.filter(i=>state.st[i.id]==="andamento").length;return{tot:a.length,d,p,cr,an};}
function vis(){const z=state.tab==="dry"?"dry":state.zone,q=state.q.toLowerCase();return allItems().filter(i=>i.z===z&&i.tp===state.type&&(state.cat==="TODOS"||i.c===state.cat)&&(!q||i.txt.toLowerCase().includes(q)||i.obs.toLowerCase().includes(q)||i.c.toLowerCase().includes(q)||i.tg.toLowerCase().includes(q)));}
function getCats(){const z=state.tab==="dry"?"dry":state.zone;return["TODOS",...(CAT[z]?.[state.type]||[])];}
function csq(c){const z=state.tab==="dry"?"dry":state.zone;const a=allItems().filter(i=>i.z===z&&i.tp===state.type&&i.c===c);if(!a.length)return"s-idle";if(a.every(i=>state.st[i.id]==="concluido"))return"s-done";if(a.some(i=>state.st[i.id]==="critico"))return"s-crit";if(a.some(i=>["andamento","concluido"].includes(state.st[i.id])))return"s-wip";return"s-idle";}
function dc(tg){return(DISC[tg]||{h:"#888"}).h;}
function tagH(tg){const c=dc(tg);return`<span class="itg" style="color:${c};background:${c}1a;border-left-color:${c}">${tg}</span>`;}
function hasDet(id){const d=state.det[id];return d&&Object.values(d).some(v=>v&&v.toString().trim());}

window.cycle=function(e,id){e.stopPropagation();state.st[id]=CYCLE[(CYCLE.indexOf(state.st[id])+1)%CYCLE.length];render();saveAll();};
window.toggleExp=function(id){state.exp[id]=!state.exp[id];render();};
window.setDet=function(id,key,val){if(!state.det[id])state.det[id]={};state.det[id][key]=val;saveAll();};
window.setTab=t=>{state.tab=t;state.cat="TODOS";state.q="";render();};
window.setZone=z=>{state.zone=z;state.cat="TODOS";render();};
window.setType=t=>{state.type=t;state.cat="TODOS";render();};
window.setCat=c=>{state.cat=c;render();};
window.setQ=v=>{state.q=v;state.cat="TODOS";render();};
window.togLeg=()=>{state.leg=!state.leg;render();};
window.togCol=c=>{state.col[c]=!state.col[c];render();};
window.togAdd=()=>{state.addForm=!state.addForm;render();};
window.setAF=function(key,val){state.af[key]=val;if(['zone','type','cat','tg'].includes(key))render();};
window.addItem=function(){
  const af={...state.af};
  if(!af.txt.trim())return;
  const cat=af.cat==='__new__'?af.catNew.trim():af.cat;
  if(!cat)return;
  if(af.cat==='__new__'&&cat){if(!CAT[af.zone])CAT[af.zone]={exec:[],bim:[]};if(!CAT[af.zone][af.type])CAT[af.zone][af.type]=[];if(!CAT[af.zone][af.type].includes(cat))CAT[af.zone][af.type].push(cat);}
  const nid='c'+Date.now();
  state.customItems.push({id:nid,z:af.zone,c:cat,tp:af.type,tg:af.tg,txt:af.txt.trim(),obs:af.obs.trim(),custom:true});
  state.st[nid]="pendente";
  if(af.zone==='dry')state.tab='dry';else{state.tab='ter';state.zone=af.zone;}
  state.type=af.type;state.cat=cat;
  state.af={zone:af.zone,type:af.type,cat:af.cat,catNew:'',tg:af.tg,txt:'',obs:''};
  state.addForm=false;
  render();saveAll();
};
window.delItem=function(id){
  state.customItems=state.customItems.filter(i=>i.id!==id);
  delete state.st[id];delete state.det[id];delete state.exp[id];
  render();saveAll();
};
