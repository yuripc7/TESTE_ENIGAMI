<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia — Quadro CUG</title>
<style>
:root{
  --font-sans:'Inter',system-ui,sans-serif;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f4f5f7;
  --color-border-secondary:#d8dadf;
  --color-border-tertiary:#e5e7eb;
  --color-text-primary:#1b1d21;
  --color-text-secondary:#6b7280;
  --color-text-tertiary:#9ca3af;
  --border-radius-md:10px;
  --border-radius-lg:14px;
}
body{background:var(--color-background-primary);padding:18px 20px;color:var(--color-text-primary)}
.ti{font-style:normal;font-weight:700}
.ti-arrow-left::before{content:'\2190'}
.ti-arrow-right::before{content:'\2192'}
.ti-check::before{content:'\2713'}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
</style>
</head>
<body>
<h2 class="sr-only">Guia interativo passo a passo para preencher o Quadro CUG do projeto VAILATTI ITAJAÍ</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,Inter,sans-serif)}
.wrap{padding:4px 0 16px}
.progress-bar{display:flex;gap:4px;margin-bottom:20px;align-items:center}
.dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);flex-shrink:0;transition:all .2s}
.dot.done{background:#059669;border-color:#059669;color:#fff}
.dot.active{background:var(--color-background-primary);border:2px solid #1d4ed8;color:#1d4ed8}
.dot-line{flex:1;height:1px;background:var(--color-border-tertiary)}
.step-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:14px}
.step-hdr{padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:12px}
.step-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.step-body{padding:14px 16px}
.field-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}
.field-box{border-radius:var(--border-radius-md);padding:10px 10px 8px;border:0.5px solid var(--color-border-tertiary)}
.field-label{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.field-value{font-size:18px;font-weight:500;line-height:1}
.field-note{font-size:10px;margin-top:4px;line-height:1.3}
.explain-row{display:flex;gap:8px;margin:8px 0;align-items:flex-start;font-size:12px;line-height:1.5;color:var(--color-text-primary)}
.explain-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}
.check-box{background:#ecfdf5;border-radius:var(--border-radius-md);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin:10px 0;font-size:12px}
.check-eq{font-family:monospace;font-size:13px;color:#059669;font-weight:500}
.warn-row{background:#fffbeb;border-radius:var(--border-radius-md);padding:8px 12px;font-size:11px;color:#92400e;margin:8px 0;line-height:1.5}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:8px}
.nav-btn{padding:8px 20px;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans,Inter,sans-serif);transition:all .15s}
.nav-btn:hover{background:var(--color-background-secondary)}
.nav-btn.primary{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.nav-btn.primary:hover{background:#1e40af}
.nav-btn:disabled{opacity:.4;cursor:default}
.step-counter{font-size:11px;color:var(--color-text-secondary)}
.coef-why{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
.coef-item{background:var(--color-background-secondary);border-radius:6px;padding:7px 10px;font-size:11px;display:flex;align-items:center;gap:8px}
.coef-num{font-size:14px;font-weight:500;flex-shrink:0;min-width:34px}
.tip-pill{display:inline-block;font-size:9px;padding:2px 7px;border-radius:99px;font-weight:500;vertical-align:middle;margin-left:4px}
.summary-tbl{width:100%;border-collapse:collapse;font-size:11px}
.summary-tbl th{background:var(--color-background-secondary);padding:6px 8px;text-align:right;font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary);border-bottom:1px solid var(--color-border-tertiary);font-weight:500}
.summary-tbl th:first-child{text-align:left}
.summary-tbl td{padding:5px 8px;border-bottom:0.5px solid var(--color-border-tertiary);text-align:right;color:var(--color-text-primary)}
.summary-tbl td:first-child{text-align:left;color:var(--color-text-secondary)}
.summary-tbl tr.tot-row td{font-weight:500;background:var(--color-background-secondary)}
.c-g{color:#059669} .c-b{color:#1d4ed8} .c-a{color:#d97706} .c-r{color:#dc2626}
.bg-g{background:#ecfdf5} .bg-b{background:#eff6ff} .bg-am{background:#fffbeb} .bg-pu{background:#f5f3ff}
</style>

<div class="wrap">

<div class="progress-bar" id="prog"></div>

<div id="step-container"></div>

<div class="nav-row">
  <button class="nav-btn" id="btn-prev" onclick="move(-1)"><i class="ti ti-arrow-left" aria-hidden="true"></i> Anterior</button>
  <span class="step-counter" id="step-counter"></span>
  <button class="nav-btn primary" id="btn-next" onclick="move(1)">Próximo <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
</div>

</div>

<script>
var cur = 0;

var steps = [
{
  title: "Antes de começar — entenda a lógica",
  color: "#3C3489", bg: "#EEEDFE", tipo: "intro",
  content: function(){return `
    <div class="explain-row"><div class="explain-icon" style="background:#EEEDFE;color:#3C3489">1</div><div>Cada linha do quadro representa um <strong>grupo de pavimentos</strong> do prédio (garagens, torre, rooftop…).</div></div>
    <div class="explain-row"><div class="explain-icon" style="background:#EEEDFE;color:#3C3489">2</div><div>Você vai preencher <strong>4 campos por linha:</strong> COMP, COB, DESC e COEF. O TOTAL é calculado automaticamente.</div></div>
    <div class="explain-row"><div class="explain-icon" style="background:#EEEDFE;color:#3C3489">3</div><div>A <strong>regra de ouro:</strong> COMP + COB + DESC deve sempre igualar o TOTAL do pavimento.</div></div>
    <div class="check-box"><span style="font-size:12px;font-weight:500">A fórmula do quadro</span><span class="check-eq">Custo = TOTAL × QTD × COEF × CUB_ajustado</span></div>
    <div class="field-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="field-box bg-b"><div class="field-label c-b">COMP</div><div class="field-value c-b">Computável</div><div class="field-note" style="color:#1e40af">Conta no CA. Área privativa e comercial.</div></div>
      <div class="field-box bg-am"><div class="field-label c-a">COB</div><div class="field-value c-a">Coberta</div><div class="field-note" style="color:#92400e">Coberta mas não-computável. Garagem, corredor.</div></div>
      <div class="field-box bg-pu"><div class="field-label" style="color:#6b21a8">DESC</div><div class="field-value" style="color:#6b21a8">Descoberta</div><div class="field-note" style="color:#581c87">Aberta ao céu. Rooftop, terraço.</div></div>
      <div class="field-box bg-g"><div class="field-label c-g">COEF</div><div class="field-value c-g">Fator</div><div class="field-note" style="color:#065f46">Custo relativo do pavimento. Garagem = 0,7. Torre = 1,0.</div></div>
    </div>
  `;}
},
{
  title: "Linha 1 — PAV. TÉRREO / G1",
  subtitle: "Tipo: Embasamento · QTD: 1",
  color: "#185FA5", bg: "#E6F1FB", tipo: "row",
  content: function(){return `
    <div class="explain-row"><div class="explain-icon" style="background:#E6F1FB;color:#185FA5">?</div><div style="color:var(--color-text-secondary)">O térreo tem dois usos: <strong>2 salas comerciais</strong> (computável) e o resto é <strong>estacionamento + lobby + core</strong> (coberto não-computável).</div></div>
    <div class="field-grid">
      <div class="field-box bg-b" style="border:1px solid #93c5fd">
        <div class="field-label c-b">COMP / LAJE</div>
        <div class="field-value c-b">209,33</div>
        <div class="field-note" style="color:#1e40af">Comercial 01 (104,67) + Comercial 02 (104,66)</div>
      </div>
      <div class="field-box bg-am" style="border:1px solid #fcd34d">
        <div class="field-label c-a">Á. COB / LAJE</div>
        <div class="field-value c-a">687,20</div>
        <div class="field-note" style="color:#92400e">896,53 − 209,33 = o restante do pavimento</div>
      </div>
      <div class="field-box" style="background:var(--color-background-secondary)">
        <div class="field-label" style="color:var(--color-text-tertiary)">Á. DESC / LAJE</div>
        <div class="field-value" style="color:var(--color-text-secondary)">0</div>
        <div class="field-note" style="color:var(--color-text-tertiary)">Sem área descoberta</div>
      </div>
      <div class="field-box bg-g" style="border:1px solid #86efac">
        <div class="field-label c-g">TOTAL P/ CUSTO</div>
        <div class="field-value c-g">896,53</div>
        <div class="field-note" style="color:#065f46">Área total do térreo</div>
      </div>
      <div class="field-box" style="border:1px solid #d97706;background:#fffbeb">
        <div class="field-label c-a">COEF EQ.</div>
        <div class="field-value c-a">0,90</div>
        <div class="field-note" style="color:#92400e">Misto: comercial acabado + garagem simples</div>
      </div>
    </div>
    <div class="check-box"><span>Verificação: 209,33 + 687,20 + 0</span><span class="check-eq">= 896,53 ✓</span></div>
    <div class="warn-row"><strong>Por que COEF = 0,90 e não 1,0?</strong> O térreo tem parte de garagem (custo baixo) e parte comercial (custo médio). A média ponderada fica em torno de 0,85–0,92. Use 0,90 para um térreo misto padrão.</div>
  `;}
},
{
  title: "Linhas 2 a 5 — PAV. G2, G3, G4 e G5",
  subtitle: "Tipo: Embasamento · QTD: 1 cada (ou agrupe em 1 linha com QTD: 4)",
  color: "#185FA5", bg: "#E6F1FB", tipo: "row",
  content: function(){return `
    <div class="explain-row"><div class="explain-icon" style="background:#E6F1FB;color:#185FA5">?</div><div style="color:var(--color-text-secondary)">Garagens puras — <strong>100% não-computável coberto</strong>. Toda a laje vai em COB. Nada vai em COMP (garagem não conta no CA).</div></div>
    <div class="field-grid">
      <div class="field-box" style="background:var(--color-background-secondary)">
        <div class="field-label" style="color:var(--color-text-tertiary)">COMP / LAJE</div>
        <div class="field-value" style="color:var(--color-text-secondary)">0</div>
        <div class="field-note" style="color:var(--color-text-tertiary)">Garagem não é computável</div>
      </div>
      <div class="field-box bg-am" style="border:1px solid #fcd34d">
        <div class="field-label c-a">Á. COB / LAJE</div>
        <div class="field-value c-a">896,53</div>
        <div class="field-note" style="color:#92400e">A laje inteira é coberta não-computável</div>
      </div>
      <div class="field-box" style="background:var(--color-background-secondary)">
        <div class="field-label" style="color:var(--color-text-tertiary)">Á. DESC / LAJE</div>
        <div class="field-value" style="color:var(--color-text-secondary)">0</div>
        <div class="field-note" style="color:var(--color-text-tertiary)">Sem área descoberta</div>
      </div>
      <div class="field-box bg-g" style="border:1px solid #86efac">
        <div class="field-label c-g">TOTAL P/ CUSTO</div>
        <div class="field-value c-g">896,53</div>
        <div class="field-note" style="color:#065f46">Por pavimento</div>
      </div>
      <div class="field-box" style="border:1px solid #d97706;background:#fffbeb">
        <div class="field-label c-a">COEF EQ.</div>
        <div class="field-value c-a">0,70</div>
        <div class="field-note" style="color:#92400e">Só estrutura + piso + rampas. Sem revestimento.</div>
      </div>
    </div>
    <div class="check-box"><span>Verificação: 0 + 896,53 + 0</span><span class="check-eq">= 896,53 ✓</span></div>
    <div class="warn-row"><strong>Dica:</strong> você pode criar <strong>uma única linha</strong> com QTD = 4 em vez de 4 linhas separadas. O resultado é idêntico. Mais limpo visualmente.</div>
    <div class="coef-why" style="margin-top:8px">
      <div class="coef-item"><div class="coef-num c-a">0,60</div><div style="color:var(--color-text-secondary)">Garagem descoberta (sem laje de cobertura)</div></div>
      <div class="coef-item" style="border:1px solid #fcd34d"><div class="coef-num c-a" style="font-weight:700">0,70</div><div style="color:var(--color-text-secondary)"><strong>Garagem coberta padrão</strong> ← use este</div></div>
    </div>
  `;}
},
{
  title: "Linha 6 — PAV. DIFERENCIADO / LAZER",
  subtitle: "Tipo: Embasamento · QTD: 1",
  color: "#185FA5", bg: "#E6F1FB", tipo: "row",
  content: function(){return `
    <div class="explain-row"><div class="explain-icon" style="background:#E6F1FB;color:#185FA5">?</div><div style="color:var(--color-text-secondary)">O pav. diferenciado tem <strong>6 gardens</strong> (computável = 196,33 m²) e a <strong>área de lazer</strong> com piscina, academia, etc. (coberta não-computável = 700,20 m²).</div></div>
    <div class="field-grid">
      <div class="field-box bg-b" style="border:1px solid #93c5fd">
        <div class="field-label c-b">COMP / LAJE</div>
        <div class="field-value c-b">196,33</div>
        <div class="field-note" style="color:#1e40af">Área privativa dos 6 gardens (computável)</div>
      </div>
      <div class="field-box bg-am" style="border:1px solid #fcd34d">
        <div class="field-label c-a">Á. COB / LAJE</div>
        <div class="field-value c-a">700,20</div>
        <div class="field-note" style="color:#92400e">896,53 − 196,33 = lazer coberto não-comp.</div>
      </div>
      <div class="field-box" style="background:var(--color-background-secondary)">
        <div class="field-label" style="color:var(--color-text-tertiary)">Á. DESC / LAJE</div>
        <div class="field-value" style="color:var(--color-text-secondary)">0</div>
        <div class="field-note" style="color:var(--color-text-tertiary)">Sem área descoberta</div>
      </div>
      <div class="field-box bg-g" style="border:1px solid #86efac">
        <div class="field-label c-g">TOTAL P/ CUSTO</div>
        <div class="field-value c-g">896,53</div>
        <div class="field-note" style="color:#065f46">Mesmo footprint das garagens</div>
      </div>
      <div class="field-box" style="border:1px solid #059669;background:#ecfdf5">
        <div class="field-label c-g">COEF EQ.</div>
        <div class="field-value c-g">1,10</div>
        <div class="field-note" style="color:#065f46">Lazer tem acabamento superior ao residencial padrão</div>
      </div>
    </div>
    <div class="check-box"><span>Verificação: 196,33 + 700,20 + 0</span><span class="check-eq">= 896,53 ✓</span></div>
    <div class="coef-why" style="margin-top:8px">
      <div class="coef-item"><div class="coef-num" style="color:#d97706">1,00</div><div style="color:var(--color-text-secondary)">Lazer simples (só salão de festas)</div></div>
      <div class="coef-item" style="border:1px solid #86efac"><div class="coef-num c-g" style="font-weight:700">1,10</div><div style="color:var(--color-text-secondary)"><strong>Lazer completo</strong> (piscina + academia) ← use este</div></div>
      <div class="coef-item"><div class="coef-num c-g">1,20</div><div style="color:var(--color-text-secondary)">Lazer premium (spa + deck molhado)</div></div>
      <div class="coef-item"><div class="coef-num c-g">1,30</div><div style="color:var(--color-text-secondary)">Lazer alto padrão total</div></div>
    </div>
  `;}
},
{
  title: "Linha 7 — PAV. TIPO × 10 (com sacada)",
  subtitle: "Tipo: Torre · QTD: 10",
  color: "#059669", bg: "#ecfdf5", tipo: "row",
  content: function(){return `
    <div class="explain-row"><div class="explain-icon" style="background:#ecfdf5;color:#059669">?</div><div style="color:var(--color-text-secondary)">Cada andar tipo tem <strong>12 studios com sacada</strong> (computável = 472,44 m²) e a <strong>circulação coberta</strong> — corredor, hall do elevador, escada (não-computável = 50,00 m²).</div></div>
    <div class="field-grid">
      <div class="field-box bg-b" style="border:1px solid #93c5fd">
        <div class="field-label c-b">COMP / LAJE</div>
        <div class="field-value c-b">472,44</div>
        <div class="field-note" style="color:#1e40af">Soma das 12 áreas privativas computáveis</div>
      </div>
      <div class="field-box bg-am" style="border:1px solid #fcd34d">
        <div class="field-label c-a">Á. COB / LAJE</div>
        <div class="field-value c-a">50,00</div>
        <div class="field-note" style="color:#92400e">522,44 − 472,44 = circulação não-comp.</div>
      </div>
      <div class="field-box" style="background:var(--color-background-secondary)">
        <div class="field-label" style="color:var(--color-text-tertiary)">Á. DESC / LAJE</div>
        <div class="field-value" style="color:var(--color-text-secondary)">0</div>
        <div class="field-note" style="color:var(--color-text-tertiary)">Sacadas já somadas no COMP</div>
      </div>
      <div class="field-box bg-g" style="border:1px solid #86efac">
        <div class="field-label c-g">TOTAL P/ CUSTO</div>
        <div class="field-value c-g">522,44</div>
        <div class="field-note" style="color:#065f46">Por andar. × 10 = 5.224,40 m² total torre</div>
      </div>
      <div class="field-box" style="border:1px solid #059669;background:#ecfdf5">
        <div class="field-label c-g">COEF EQ.</div>
        <div class="field-value c-g">1,05</div>
        <div class="field-note" style="color:#065f46">Médio padrão com sacada. +5% vs torre sem sacada.</div>
      </div>
    </div>
    <div class="check-box"><span>Verificação: 472,44 + 50,00 + 0</span><span class="check-eq">= 522,44 ✓</span></div>
    <div class="coef-why" style="margin-top:8px">
      <div class="coef-item"><div class="coef-num" style="color:#1d4ed8">1,00</div><div style="color:var(--color-text-secondary)">Residencial médio padrão sem sacada</div></div>
      <div class="coef-item" style="border:1px solid #86efac"><div class="coef-num c-g" style="font-weight:700">1,05</div><div style="color:var(--color-text-secondary)"><strong>Médio padrão com sacada</strong> ← use este</div></div>
      <div class="coef-item"><div class="coef-num c-g">1,10</div><div style="color:var(--color-text-secondary)">Médio-alto padrão / acabamento superior</div></div>
      <div class="coef-item"><div class="coef-num c-g">1,20+</div><div style="color:var(--color-text-secondary)">Alto padrão / luxo</div></div>
    </div>
  `;}
},
{
  title: "Linha 8 — ROOFTOP (lazer descoberto)",
  subtitle: "Tipo: Telhado · QTD: 1",
  color: "#854F0B", bg: "#FAEEDA", tipo: "row",
  content: function(){return `
    <div class="explain-row"><div class="explain-icon" style="background:#FAEEDA;color:#854F0B">?</div><div style="color:var(--color-text-secondary)">O rooftop é <strong>totalmente descoberto</strong> — terraço de lazer sem nenhuma cobertura. Toda a área vai em DESC. COMP e COB ficam em zero.</div></div>
    <div class="field-grid">
      <div class="field-box" style="background:var(--color-background-secondary)">
        <div class="field-label" style="color:var(--color-text-tertiary)">COMP / LAJE</div>
        <div class="field-value" style="color:var(--color-text-secondary)">0</div>
        <div class="field-note" style="color:var(--color-text-tertiary)">Rooftop não é computável</div>
      </div>
      <div class="field-box" style="background:var(--color-background-secondary)">
        <div class="field-label" style="color:var(--color-text-tertiary)">Á. COB / LAJE</div>
        <div class="field-value" style="color:var(--color-text-secondary)">0</div>
        <div class="field-note" style="color:var(--color-text-tertiary)">Sem área coberta</div>
      </div>
      <div class="field-box bg-pu" style="border:1px solid #c4b5fd">
        <div class="field-label" style="color:#6b21a8">Á. DESC / LAJE</div>
        <div class="field-value" style="color:#6b21a8">483,54</div>
        <div class="field-note" style="color:#581c87">Todo o terraço é descoberto</div>
      </div>
      <div class="field-box bg-g" style="border:1px solid #86efac">
        <div class="field-label c-g">TOTAL P/ CUSTO</div>
        <div class="field-value c-g">483,54</div>
        <div class="field-note" style="color:#065f46">Mesma área do pav tipo sem sacada</div>
      </div>
      <div class="field-box bg-am" style="border:1px solid #fcd34d">

function render(){
  var p=document.getElementById('prog');
  p.innerHTML='';
  steps.forEach(function(s,i){
    if(i>0){var l=document.createElement('div');l.className='dot-line';p.appendChild(l);}
    var d=document.createElement('div');
    d.className='dot'+(i<cur?' done':i===cur?' active':'');
    d.textContent=i<cur?'✓':(i+1);
    d.onclick=(function(idx){return function(){cur=idx;render();};})(i);
    p.appendChild(d);
  });

  var s=steps[cur];
  var c=document.getElementById('step-container');
  c.innerHTML='<div class="step-card">'
    +'<div class="step-hdr">'
    +'<div class="step-num" style="background:'+s.bg+';color:'+s.color+'">'+((cur===steps.length-1)?'<i class="ti ti-check" aria-hidden="true"></i>':(cur+1))+'</div>'
    +'<div><div style="font-size:14px;font-weight:500">'+s.title+'</div>'
    +(s.subtitle?'<div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">'+s.subtitle+'</div>':'')
    +'</div></div>'
    +'<div class="step-body">'+s.content()+'</div>'
    +'</div>';

  document.getElementById('step-counter').textContent='Passo '+(cur+1)+' de '+steps.length;
  document.getElementById('btn-prev').disabled=cur===0;
  var nb=document.getElementById('btn-next');
  if(cur===steps.length-1){nb.textContent='Concluído ✓';nb.disabled=true;}
  else{nb.innerHTML='Próximo <i class="ti ti-arrow-right" aria-hidden="true"></i>';nb.disabled=false;}
}

function move(dir){
  cur=Math.max(0,Math.min(steps.length-1,cur+dir));
  render();
}

render();
</script>
